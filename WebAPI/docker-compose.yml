version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD_QA}
    ports:
      - "1433:1433"
    networks:
      - webapi-network-compose

  webapi:
    build: .
    ports:
      - "5000:5000"
    environment:
      JWT_KEY: ${JWT_KEY}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=WEBAPI;User Id=sa;Password=${SA_PASSWORD_QA};
    depends_on:
      - sqlserver
    networks:
      - webapi-network-compose

networks:
  webapi-network-compose:



